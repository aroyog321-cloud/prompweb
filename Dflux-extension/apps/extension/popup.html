<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promptly Prompt Optimizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f5f5f5;
    }
    
    .container {
      padding: 20px;
    }
    
    h1 {
      font-size: 18px;
      margin-bottom: 20px;
      color: #333;
    }
    
    .setting {
      margin-bottom: 16px;
    }
    
    .setting label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #555;
    }
    
    .setting select,
    .setting input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
    
    .toggle {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .toggle input {
      width: auto;
      margin-right: 8px;
    }
    
    .button {
      width: 100%;
      padding: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .button:hover {
      background-color: #0056b3;
    }
    
    .button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      text-align: center;
    }
    
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Promptly Settings</h1>
    
    <div class="setting toggle">
      <input type="checkbox" id="optimizationEnabled" checked>
      <label for="optimizationEnabled">Enable Optimization</label>
    </div>
    
    <div class="setting">
      <label for="defaultMode">Default Optimization Mode</label>
      <select id="defaultMode">
        <option value="GENERAL">General</option>
        <option value="DEVELOPER">Developer</option>
        <option value="DESIGNER">Designer</option>
        <option value="MARKETING">Marketing</option>
        <option value="RESEARCH">Research</option>
        <option value="BUSINESS">Business</option>
        <option value="CONTENT_CREATOR">Content Creator</option>
        <option value="STARTUP_FOUNDER">Startup Founder</option>
      </select>
    </div>
    
    <div class="setting">
      <label for="defaultLevel">Default Rewrite Level</label>
      <select id="defaultLevel">
        <option value="LIGHT">Light</option>
        <option value="MEDIUM" selected>Medium</option>
        <option value="AGGRESSIVE">Aggressive</option>
        <option value="EXPERT">Expert</option>
      </select>
    </div>
    
    <div class="setting">
      <label for="keyboardShortcut">Keyboard Shortcut</label>
      <input type="text" id="keyboardShortcut" value="Ctrl+Shift+P" readonly>
      <small>(Customization coming soon)</small>
    </div>
    
    <button class="button" id="saveButton">Save Settings</button>
    
    <div class="status" id="statusMessage" style="display: none;"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const optimizationEnabledCheckbox = document.getElementById('optimizationEnabled')
      const defaultModeSelect = document.getElementById('defaultMode')
      const defaultLevelSelect = document.getElementById('defaultLevel')
      const keyboardShortcutInput = document.getElementById('keyboardShortcut')
      const saveButton = document.getElementById('saveButton')
      const statusMessage = document.getElementById('statusMessage')

      // Load current settings
      chrome.storage.sync.get(null, (settings) => {
        optimizationEnabledCheckbox.checked = settings.optimizationEnabled ?? true
        defaultModeSelect.value = settings.defaultMode ?? 'GENERAL'
        defaultLevelSelect.value = settings.defaultLevel ?? 'MEDIUM'
        keyboardShortcutInput.value = settings.keyboardShortcut ?? 'Ctrl+Shift+P'
      })

      // Save settings
      saveButton.addEventListener('click', () => {
        const settings = {
          optimizationEnabled: optimizationEnabledCheckbox.checked,
          defaultMode: defaultModeSelect.value,
          defaultLevel: defaultLevelSelect.value,
          keyboardShortcut: keyboardShortcutInput.value
        }

        chrome.storage.sync.set(settings, () => {
          statusMessage.textContent = 'Settings saved successfully!'
          statusMessage.className = 'status success'
          statusMessage.style.display = 'block'

          // Hide status after 2 seconds
          setTimeout(() => {
            statusMessage.style.display = 'none'
          }, 2000)
        })
      })
    })
  </script>
</body>
</html>
